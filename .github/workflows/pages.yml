name: Build & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release & DMG
        run: ./build.sh release

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp intro.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload DMG to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: build/WinMove.dmg
          prerelease: true
          make_latest: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
